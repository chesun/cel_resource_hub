site_name: CEL Resource Hub
site_description: >-
  A personal hub Christina Sun built while offboarding from the California Education
  Lab (UC Davis): links to her CEL code repositories and the workflows she uses —
  recommendations from one researcher, not official lab documentation.
site_author: California Education Lab, UC Davis

# Canonical URL (custom-domain path; also reachable at
# chesun.github.io/cel_resource_hub/, which redirects here).
site_url: https://christinasun.net/cel_resource_hub/

repo_url: https://github.com/chesun/cel_resource_hub
repo_name: chesun/cel_resource_hub
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/video-scroll.js

plugins:
  - search
  - open-in-new-tab        # external links open in a new tab (internal links unaffected)

nav:
  - Home: index.md
  - Offboarding repositories:
      - repositories/index.md
      - Value Added (va_consolidated): repositories/va-consolidated.md
      - CALPADS (calpads): repositories/calpads.md
      - CSAC 2023 Survey (csac): repositories/csac.md
      - CSAC 2024 Survey (csac_2024): repositories/csac-2024.md
      - CSAC 2025 Survey (csac2025): repositories/csac-2025.md
      - Cesar Chavez Youth Leadership Conference 2025 (ccylc_2025): repositories/ccylc-2025.md
  - Offboarding:
      - offboarding/index.md
      - Handoff README template: offboarding/readme-template.md
  - Workflow Tips:
      - workflow-tips/index.md
      - The recommended workflow: workflow-tips/recommended-workflow.md
      - Editing Stata in VSCode: workflow-tips/editing-stata-vscode.md
      - Version control using git: workflow-tips/git-for-newcomers.md
      - Local ↔ server sync: workflow-tips/local-server-sync.md
      - Working on Scribe: workflow-tips/working-on-scribe.md
      - Stata GUI on Windows: workflow-tips/xstata-gui-windows.md
      - Data safety: workflow-tips/data-safety.md
      - gitignore setup for data security: workflow-tips/gitignore-setup.md
      - Reproducible pipelines: workflow-tips/reproducible-pipelines.md
      - Claude Code intro: workflow-tips/claude-code-intro.md
  - Resources:
      - resources/index.md
      - Tools & access: resources/tools.md
      - LaTeX Beamer templates: resources/latex-beamer-templates.md
